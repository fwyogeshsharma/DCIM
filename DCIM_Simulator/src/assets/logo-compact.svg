<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="compactGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compactDropGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="80" rx="12" fill="url(#compactGradient)"/>

  <!-- Icon Background Circle -->
  <circle cx="40" cy="40" r="28" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="1.5"/>

  <!-- Cooling Drop -->
  <path d="M 40 18 Q 30 28 30 38 Q 30 50 40 56 Q 50 50 50 38 Q 50 28 40 18 Z"
        fill="url(#compactDropGradient)"
        stroke="rgba(255, 255, 255, 0.5)"
        stroke-width="1.2"/>

  <!-- Cooling Symbol -->
  <circle cx="40" cy="38" r="3" fill="#667eea"/>
  <line x1="40" y1="33" x2="40" y2="43" stroke="#667eea" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="35" y1="38" x2="45" y2="38" stroke="#667eea" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Temperature Lines (perfectly inside circle at bottom) -->
  <line x1="24" y1="57" x2="30" y2="57" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="50" y1="57" x2="56" y2="57" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="26" y1="61" x2="29" y2="61" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="51" y1="61" x2="55" y2="61" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>

  <!-- Text -->
  <text x="78" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    AI DATACENTER
  </text>
  <text x="78" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="400" fill="rgba(255, 255, 255, 0.85)" letter-spacing="0.8">
    COOLING SIM
  </text>

  <!-- IoT Indicator -->
  <text x="168" y="18" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="600" fill="rgba(255, 255, 255, 0.7)">
    IoT
  </text>
  <circle cx="188" cy="15" r="2.5" fill="#4ade80" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
