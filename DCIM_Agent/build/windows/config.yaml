# Network Monitor Agent Configuration - MAXIMUM DETAILS
# This configuration captures as much detail as possible from both the agent machine and SNMP devices

# Server settings
server:
  url: "https://FABER:8443/api/v1"  # Use HTTPS for secure mTLS connection
  timeout: 30s
  retry_attempts: 3
  retry_delay: 5s

  # mTLS (Mutual TLS) Configuration - Enterprise Security
  tls:
    # Enable/disable TLS (set to false for plain HTTP)
    enabled: true

    # Client certificate and key for client authentication
    # Generate using: openssl genrsa -out client.key 2048
    #                 openssl req -new -x509 -key client.key -out client.crt -days 365
    client_cert_path: "./certs/client.crt"
    client_key_path: "./certs/client.key"

    # CA certificate to verify server certificate
    # If empty, system CA certificates will be used
    ca_cert_path: "./certs/ca.crt"

    # Skip server certificate verification (ONLY FOR TESTING - INSECURE)
    insecure_skip_verify: false

    # Minimum TLS version: "1.2" or "1.3" (default: "1.2")
    min_tls_version: "1.2"

# Agent settings
agent:
  # Unique identifier for this agent (auto-generated if empty)
  id: ""
  # Human-readable name for this machine
  name: ""
  # Metrics collection interval (collect every 30 seconds for more detail)
  collect_interval: 30s
  # Normal metrics send interval (send every 2 minutes for real-time monitoring)
  send_interval: 120s
  # Max metrics to batch in one send
  batch_size: 100

# SNMP Manager settings - COMPREHENSIVE MONITORING
snmp_manager:
  # Enable SNMP device monitoring
  enabled: true
  # Poll devices every 30 seconds for detailed monitoring
  poll_interval: 30s

  # SNMP devices to monitor
  devices:
    # ========================================
    # HP 630 Notebook - Ubuntu Linux
    # ========================================
    - name: "hp-630-notebook"
      host: "192.168.1.14"
      port: 161
      community: "public"
      version: "2c"
      timeout: 5s
      retries: 3
      oids:
        # ===== SYSTEM INFORMATION =====
        - oid: "1.3.6.1.2.1.1.1.0"
          name: "system_description"
          type: "string"
        - oid: "1.3.6.1.2.1.1.3.0"
          name: "system_uptime_ticks"
          type: "counter"
        - oid: "1.3.6.1.2.1.1.5.0"
          name: "system_name"
          type: "string"
        - oid: "1.3.6.1.2.1.25.1.5.0"
          name: "system_users_logged_in"
          type: "gauge"
        - oid: "1.3.6.1.2.1.25.1.6.0"
          name: "system_processes_running"
          type: "gauge"

        # ===== HOST-RESOURCES - UPTIME =====
        - oid: "1.3.6.1.2.1.25.1.1.0"
          name: "host_uptime_ticks"
          type: "counter"

        # ===== CPU METRICS (UCD-SNMP-MIB) =====
        # Requires: sudo apt install snmpd with UCD-SNMP-MIB configured
        - oid: "1.3.6.1.4.1.2021.11.9.0"
          name: "cpu_idle_percent"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.11.10.0"
          name: "cpu_user_percent"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.11.11.0"
          name: "cpu_system_percent"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.11.50.0"
          name: "cpu_raw_user"
          type: "counter"
        - oid: "1.3.6.1.4.1.2021.11.51.0"
          name: "cpu_raw_nice"
          type: "counter"
        - oid: "1.3.6.1.4.1.2021.11.52.0"
          name: "cpu_raw_system"
          type: "counter"
        - oid: "1.3.6.1.4.1.2021.11.53.0"
          name: "cpu_raw_idle"
          type: "counter"
        - oid: "1.3.6.1.4.1.2021.11.54.0"
          name: "cpu_raw_wait"
          type: "counter"
        - oid: "1.3.6.1.4.1.2021.11.56.0"
          name: "cpu_raw_interrupt"
          type: "counter"

        # ===== MEMORY METRICS (UCD-SNMP-MIB) =====
        - oid: "1.3.6.1.4.1.2021.4.3.0"
          name: "memory_swap_total_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.4.0"
          name: "memory_swap_available_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.5.0"
          name: "memory_total_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.6.0"
          name: "memory_available_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.11.0"
          name: "memory_total_real_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.12.0"
          name: "memory_available_real_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.13.0"
          name: "memory_total_swap_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.14.0"
          name: "memory_total_free_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.15.0"
          name: "memory_minimum_swap_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.100.0"
          name: "memory_swap_error_flag"
          type: "gauge"

        # ===== LOAD AVERAGE (UCD-SNMP-MIB) =====
        - oid: "1.3.6.1.4.1.2021.10.1.3.1"
          name: "load_avg_1min"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.10.1.3.2"
          name: "load_avg_5min"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.10.1.3.3"
          name: "load_avg_15min"
          type: "gauge"

        # ===== DISK METRICS - Root Partition (UCD-SNMP-MIB) =====
        - oid: "1.3.6.1.4.1.2021.9.1.2.1"
          name: "disk_root_path"
          type: "string"
        - oid: "1.3.6.1.4.1.2021.9.1.3.1"
          name: "disk_root_device"
          type: "string"
        - oid: "1.3.6.1.4.1.2021.9.1.6.1"
          name: "disk_root_total_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.9.1.7.1"
          name: "disk_root_available_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.9.1.8.1"
          name: "disk_root_used_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.9.1.9.1"
          name: "disk_root_percent_used"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.9.1.10.1"
          name: "disk_root_percent_inode_used"
          type: "gauge"

        # ===== DISK I/O STATISTICS (UCD-SNMP-MIB) =====
        - oid: "1.3.6.1.4.1.2021.13.15.1.1.2.1"
          name: "diskio_device"
          type: "string"
        - oid: "1.3.6.1.4.1.2021.13.15.1.1.3.1"
          name: "diskio_reads"
          type: "counter"
        - oid: "1.3.6.1.4.1.2021.13.15.1.1.4.1"
          name: "diskio_writes"
          type: "counter"
        - oid: "1.3.6.1.4.1.2021.13.15.1.1.5.1"
          name: "diskio_read_bytes"
          type: "counter"
        - oid: "1.3.6.1.4.1.2021.13.15.1.1.6.1"
          name: "diskio_written_bytes"
          type: "counter"

        # ===== NETWORK INTERFACE - Interface 1 (Standard MIB-II) =====
        - oid: "1.3.6.1.2.1.2.2.1.2.1"
          name: "interface1_description"
          type: "string"
        - oid: "1.3.6.1.2.1.2.2.1.5.1"
          name: "interface1_speed_bps"
          type: "gauge"
        - oid: "1.3.6.1.2.1.2.2.1.8.1"
          name: "interface1_status"
          type: "gauge"
        - oid: "1.3.6.1.2.1.2.2.1.10.1"
          name: "interface1_octets_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.11.1"
          name: "interface1_unicast_pkts_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.12.1"
          name: "interface1_nonunicast_pkts_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.13.1"
          name: "interface1_discards_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.14.1"
          name: "interface1_errors_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.16.1"
          name: "interface1_octets_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.17.1"
          name: "interface1_unicast_pkts_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.18.1"
          name: "interface1_nonunicast_pkts_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.19.1"
          name: "interface1_discards_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.20.1"
          name: "interface1_errors_out"
          type: "counter"

        # ===== NETWORK INTERFACE - Interface 2 (Standard MIB-II) =====
        - oid: "1.3.6.1.2.1.2.2.1.2.2"
          name: "interface2_description"
          type: "string"
        - oid: "1.3.6.1.2.1.2.2.1.10.2"
          name: "interface2_octets_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.14.2"
          name: "interface2_errors_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.16.2"
          name: "interface2_octets_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.20.2"
          name: "interface2_errors_out"
          type: "counter"

        # ===== TCP/UDP STATISTICS (MIB-II) =====
        - oid: "1.3.6.1.2.1.6.5.0"
          name: "tcp_active_opens"
          type: "counter"
        - oid: "1.3.6.1.2.1.6.6.0"
          name: "tcp_passive_opens"
          type: "counter"
        - oid: "1.3.6.1.2.1.6.9.0"
          name: "tcp_current_established"
          type: "gauge"
        - oid: "1.3.6.1.2.1.6.10.0"
          name: "tcp_segments_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.6.11.0"
          name: "tcp_segments_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.6.12.0"
          name: "tcp_retransmitted_segments"
          type: "counter"
        - oid: "1.3.6.1.2.1.7.1.0"
          name: "udp_datagrams_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.7.4.0"
          name: "udp_datagrams_out"
          type: "counter"

        # ===== TEMPERATURE SENSORS (LM-SENSORS-MIB) =====
        # Requires: lm-sensors installed on Ubuntu (sudo apt install lm-sensors)
        # Configure in /etc/snmp/snmpd.conf: extend sensors /usr/bin/sensors 2>/dev/null || /bin/true
        # Note: Sensor indexes may vary by hardware. Use snmpwalk to find correct indexes:
        # snmpwalk -v2c -c public 192.168.1.14 1.3.6.1.4.1.2021.13.16

        # Temperature Sensor 1 (typically CPU core)
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.3.1"
          name: "temp_sensor1_value"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.2.1"
          name: "temp_sensor1_name"
          type: "string"

        # Temperature Sensor 2
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.3.2"
          name: "temp_sensor2_value"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.2.2"
          name: "temp_sensor2_name"
          type: "string"

        # Temperature Sensor 3
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.3.3"
          name: "temp_sensor3_value"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.2.3"
          name: "temp_sensor3_name"
          type: "string"

        # Temperature Sensor 4
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.3.4"
          name: "temp_sensor4_value"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.2.4"
          name: "temp_sensor4_name"
          type: "string"

    # ========================================
    # HP Pavilion Notebook - Ubuntu Linux
    # ========================================
    - name: "hp-pavilion-notebook"
      host: "192.168.1.15"
      port: 161
      community: "public"
      version: "2c"
      timeout: 5s
      retries: 3
      oids:
        # Same comprehensive OIDs as hp-630-notebook
        # (Copy the entire OID list from above)

        # System Information
        - oid: "1.3.6.1.2.1.1.1.0"
          name: "system_description"
          type: "string"
        - oid: "1.3.6.1.2.1.1.3.0"
          name: "system_uptime_ticks"
          type: "counter"
        - oid: "1.3.6.1.2.1.1.5.0"
          name: "system_name"
          type: "string"
        - oid: "1.3.6.1.2.1.25.1.5.0"
          name: "system_users_logged_in"
          type: "gauge"
        - oid: "1.3.6.1.2.1.25.1.6.0"
          name: "system_processes_running"
          type: "gauge"

        # CPU Metrics
        - oid: "1.3.6.1.4.1.2021.11.9.0"
          name: "cpu_idle_percent"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.11.10.0"
          name: "cpu_user_percent"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.11.11.0"
          name: "cpu_system_percent"
          type: "gauge"

        # Memory Metrics
        - oid: "1.3.6.1.4.1.2021.4.5.0"
          name: "memory_total_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.6.0"
          name: "memory_available_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.4.14.0"
          name: "memory_total_free_kb"
          type: "gauge"

        # Load Average
        - oid: "1.3.6.1.4.1.2021.10.1.3.1"
          name: "load_avg_1min"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.10.1.3.2"
          name: "load_avg_5min"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.10.1.3.3"
          name: "load_avg_15min"
          type: "gauge"

        # Disk Metrics
        - oid: "1.3.6.1.4.1.2021.9.1.6.1"
          name: "disk_root_total_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.9.1.7.1"
          name: "disk_root_available_kb"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.9.1.9.1"
          name: "disk_root_percent_used"
          type: "gauge"

        # Network Interface 1
        - oid: "1.3.6.1.2.1.2.2.1.10.1"
          name: "interface1_octets_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.16.1"
          name: "interface1_octets_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.14.1"
          name: "interface1_errors_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.20.1"
          name: "interface1_errors_out"
          type: "counter"

        # TCP/UDP Stats
        - oid: "1.3.6.1.2.1.6.9.0"
          name: "tcp_current_established"
          type: "gauge"
        - oid: "1.3.6.1.2.1.6.12.0"
          name: "tcp_retransmitted_segments"
          type: "counter"

        # ===== TEMPERATURE SENSORS (LM-SENSORS-MIB) =====
        # Temperature Sensor 1
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.3.1"
          name: "temp_sensor1_value"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.2.1"
          name: "temp_sensor1_name"
          type: "string"

        # Temperature Sensor 2
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.3.2"
          name: "temp_sensor2_value"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.2.2"
          name: "temp_sensor2_name"
          type: "string"

        # Temperature Sensor 3
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.3.3"
          name: "temp_sensor3_value"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.2.3"
          name: "temp_sensor3_name"
          type: "string"

        # Temperature Sensor 4
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.3.4"
          name: "temp_sensor4_value"
          type: "gauge"
        - oid: "1.3.6.1.4.1.2021.13.16.2.1.2.4"
          name: "temp_sensor4_name"
          type: "string"

# Database settings
database:
  path: "./agent.db"
  retention_days: 30

# Alert thresholds
alerts:
  cpu:
    warning: 80.0
    critical: 95.0
  memory:
    warning: 85.0
    critical: 95.0
  disk:
    warning: 85.0
    critical: 95.0
  temperature:
    warning: 75.0
    critical: 85.0

# Logging settings
logging:
  level: "info"  # Use "debug" to see detailed per-metric logs
  file: "./agent.log"
  max_size_mb: 100  # Increased for more detailed logging
  max_backups: 5
