###############################################################################
# SNMP Daemon Configuration - Ubuntu Full Monitoring
###############################################################################

# Listen on all network interfaces
agentaddress udp:161

# System information
sysLocation    "Ubuntu Server - Full Monitoring"
sysContact     admin@example.com

###############################################################################
# DISK MONITORING - CRITICAL for disk metrics
###############################################################################
disk / 10%
includeAllDisks 10%

###############################################################################
# LOAD AVERAGE MONITORING - CRITICAL for load metrics
###############################################################################
load 12 10 5

###############################################################################
# PROCESS MONITORING
###############################################################################
proc sshd
proc cron
proc systemd

###############################################################################
# SYSTEM EXTENSIONS
###############################################################################
extend uptime /bin/uptime
extend hostname /bin/hostname
extend df /bin/df -h
extend free /usr/bin/free -m
extend netstat /bin/netstat -s
extend sensors /usr/bin/sensors 2>/dev/null || /bin/true

###############################################################################
# DISK I/O MONITORING
###############################################################################
diskio sda
diskio sdb
diskio nvme0n1
diskio vda

###############################################################################
# VIEW AND ACCESS CONTROL
###############################################################################
# Define a view that includes everything
view all included .1

# Community string (read-only access to all)
rocommunity public default -V all
rocommunity6 public default -V all
