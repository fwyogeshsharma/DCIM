# Water Cooling System Configuration
# All thresholds and ranges for cooling system monitoring

cooling:
  # Temperature Thresholds (Celsius)
  temperature:
    inlet_max_condenser_on: 10.0        # Max inlet temp when condenser is ON
    outlet_max_normal: 50.0             # Normal max outlet temperature
    outlet_max_critical: 60.0           # Critical outlet temperature (emergency)
    temperature_tolerance: 2.0          # ±2°C tolerance for comparison
    delta_min_cpu_on: 3.0               # Minimum temp difference when CPU is ON

  # Pressure Thresholds (PSI)
  pressure:
    normal_min: 40.0                    # Minimum normal operating pressure
    normal_max: 60.0                    # Maximum normal operating pressure
    normal_operating: 50.0              # Ideal operating pressure
    pump_off_max: 5.0                   # Max pressure when pump is OFF
    leakage_threshold: 10.0             # Below (min - 10) indicates leakage

  # Flow Rate Thresholds (LPM - Liters Per Minute)
  flow:
    min_normal_flow: 5.0                # Minimum normal flow rate
    max_normal_flow: 20.0               # Maximum normal flow rate
    critical_low_flow: 2.0              # Critical low flow (pump failure suspected)
    zero_flow_threshold: 0.5            # Below this is considered zero flow

  # Component-Specific Thresholds
  components:
    # Condenser Thresholds
    condenser:
      max_temp_difference: 5.0          # Max inlet-outlet temp diff (too high = overload)
      min_temp_difference: 2.0          # Min temp diff when working (below = failure)
      efficiency_warning: 3.0           # Warn if temp reduction < this value

    # Pump Thresholds
    pump:
      min_rpm: 1000                     # Minimum RPM when pump is on
      max_rpm: 5000                     # Maximum RPM (too high = issue)
      min_flow_rate: 5.0                # Minimum flow rate when pump on (LPM)

    # Server/Heat Source Thresholds
    server:
      max_heat_load: 25.0               # Maximum heat load in kW
      min_temp_rise: 3.0                # Minimum temp rise across server when CPU on
      max_outlet_temp: 65.0             # Maximum outlet temperature from server

  # Alert Configuration
  alerts:
    enabled: true
    severity_levels:
      info: "INFO"
      warning: "WARNING"
      critical: "CRITICAL"

  # Validation Settings
  validation:
    max_temperature: 100.0              # Max valid temperature (sanity check)
    min_temperature: -10.0              # Min valid temperature
    max_pressure: 100.0                 # Max valid pressure (sanity check)
    min_pressure: 0.0                   # Min valid pressure
    max_flow: 50.0                      # Max valid flow rate (sanity check)
    min_flow: 0.0                       # Min valid flow rate
    timestamp_tolerance_seconds: 300    # Accept timestamps within 5 minutes
