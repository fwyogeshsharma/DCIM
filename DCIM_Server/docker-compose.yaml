version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dcim_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: dcim_db
    ports:
      - "5433:5432"
    volumes:
      - dcim_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dcim_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dcim_postgres_data:
