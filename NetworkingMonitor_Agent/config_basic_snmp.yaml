# Network Monitor Agent Configuration - Basic SNMP
# This config only uses OIDs that work without UCD-SNMP-MIB configuration

# Server settings
server:
  url: "http://localhost:8080/api/v1"
  timeout: 30s
  retry_attempts: 3
  retry_delay: 5s

# Agent settings
agent:
  id: ""
  name: ""
  collect_interval: 60s
  send_interval: 300s
  batch_size: 50

# SNMP Manager settings
snmp_manager:
  enabled: true
  poll_interval: 60s
  devices:
    # HP 630 Notebook - Basic monitoring
    - name: "hp-630-notebook"
      host: "192.168.1.14"
      port: 161
      community: "public"
      version: "2c"
      timeout: 5s
      retries: 3
      oids:
        # System Information (Standard MIB-II - Always available)
        - oid: "1.3.6.1.2.1.1.1.0"
          name: "system_description"
          type: "string"
        - oid: "1.3.6.1.2.1.1.3.0"
          name: "system_uptime_ticks"
          type: "counter"
        - oid: "1.3.6.1.2.1.1.5.0"
          name: "system_name"
          type: "string"
        - oid: "1.3.6.1.2.1.25.1.5.0"
          name: "system_users_logged_in"
          type: "gauge"
        - oid: "1.3.6.1.2.1.25.1.6.0"
          name: "system_processes_running"
          type: "gauge"

        # Network Interface 1 (Standard MIB-II - Always available)
        - oid: "1.3.6.1.2.1.2.2.1.2.1"
          name: "interface1_description"
          type: "string"
        - oid: "1.3.6.1.2.1.2.2.1.10.1"
          name: "interface1_octets_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.16.1"
          name: "interface1_octets_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.14.1"
          name: "interface1_errors_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.20.1"
          name: "interface1_errors_out"
          type: "counter"

        # TCP Stats (Standard MIB-II - Always available)
        - oid: "1.3.6.1.2.1.6.9.0"
          name: "tcp_current_established"
          type: "gauge"

    # HP Pavilion Notebook - Basic monitoring
    - name: "hp-pavilion-notebook"
      host: "192.168.1.15"
      port: 161
      community: "public"
      version: "2c"
      timeout: 5s
      retries: 3
      oids:
        # Same basic OIDs as above
        - oid: "1.3.6.1.2.1.1.1.0"
          name: "system_description"
          type: "string"
        - oid: "1.3.6.1.2.1.1.3.0"
          name: "system_uptime_ticks"
          type: "counter"
        - oid: "1.3.6.1.2.1.1.5.0"
          name: "system_name"
          type: "string"
        - oid: "1.3.6.1.2.1.25.1.5.0"
          name: "system_users_logged_in"
          type: "gauge"
        - oid: "1.3.6.1.2.1.25.1.6.0"
          name: "system_processes_running"
          type: "gauge"
        - oid: "1.3.6.1.2.1.2.2.1.2.1"
          name: "interface1_description"
          type: "string"
        - oid: "1.3.6.1.2.1.2.2.1.10.1"
          name: "interface1_octets_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.16.1"
          name: "interface1_octets_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.14.1"
          name: "interface1_errors_in"
          type: "counter"
        - oid: "1.3.6.1.2.1.2.2.1.20.1"
          name: "interface1_errors_out"
          type: "counter"
        - oid: "1.3.6.1.2.1.6.9.0"
          name: "tcp_current_established"
          type: "gauge"

# Database settings
database:
  path: "./agent.db"
  retention_days: 30

# Alert thresholds
alerts:
  cpu:
    warning: 80.0
    critical: 95.0
  memory:
    warning: 85.0
    critical: 95.0
  disk:
    warning: 85.0
    critical: 95.0
  temperature:
    warning: 75.0
    critical: 85.0

# Logging settings
logging:
  level: "info"
  file: "./agent.log"
  max_size_mb: 100
  max_backups: 5
