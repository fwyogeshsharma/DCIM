version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: dcim-postgres
    environment:
      POSTGRES_DB: dcim_aggregator
      POSTGRES_USER: dcim
      POSTGRES_PASSWORD: dcim_pas
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcim"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dcim-network

  redis:
    image: redis:7-alpine
    container_name: dcim-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - dcim-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dcim-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dcim.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - dcim-network

  aggregator:
    build: .
    container_name: dcim-aggregator
    environment:
      NODE_ENV: production
      PORT: 3002
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: dcim_aggregator
      POSTGRES_USER: dcim
      POSTGRES_PASSWORD: dcim_password
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./certs:/app/certs
    restart: unless-stopped
    networks:
      - dcim-network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  dcim-network:
    driver: bridge
